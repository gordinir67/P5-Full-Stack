<mat-toolbar color="primary" class="auth-toolbar">
  <a routerLink="/" class="auth-toolbar__brand" aria-label="Retour à l’accueil">
    <img src="assets/logo_p6.png" alt="MDD" class="auth-toolbar__logo" />
  </a>
</mat-toolbar>

<main class="container page">
  <div class="topbar">
    <a mat-icon-button routerLink="/" aria-label="Retour">
      <mat-icon>west</mat-icon>
    </a>
    <h1 class="topbar__title">Inscription</h1>
    <span aria-hidden="true"></span>
  </div>

  <mat-card class="auth-card">
    <mat-card-content>
      <form class="auth-form" action="#" method="post">
        <!-- Champ 1 -->
        <div class="field">
          <label class="field-label" for="register-username">Nom d’utilisateur</label>
          <mat-form-field appearance="outline" class="full">
            <input
              matInput
              id="register-username"
              type="text"
            
              autocomplete="username"
            />
          </mat-form-field>
        </div>

        <!-- Champ 2 -->
        <div class="field">
          <label class="field-label" for="register-email">Adresse e-mail</label>
          <mat-form-field appearance="outline" class="full">
            <input
              matInput
              id="register-email"
              type="email"

              autocomplete="email"
            />
          </mat-form-field>
        </div>

        <!-- Champ 3 -->
        <div class="field">
          <label class="field-label" for="register-password">Mot de passe</label>
          <mat-form-field appearance="outline" class="full">
            <input
              matInput
              id="register-password"
              type="password"

              autocomplete="new-password"
            />
          </mat-form-field>
        </div>

        <div class="actions">
          <button class="mdd-button" type="button">S’inscrire</button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</main>
