<mat-toolbar color="primary" class="auth-toolbar">
  <a routerLink="/" class="auth-toolbar__brand" aria-label="Retour à l’accueil">
    <img src="assets/logo_p6.png" alt="MDD" class="auth-toolbar__logo" />
  </a>
</mat-toolbar>

<main class="container page">
  <div class="topbar">
    <a mat-icon-button routerLink="/" aria-label="Retour">
      <mat-icon>west</mat-icon>
    </a>
    <h1 class="topbar__title">Se connecter</h1>
    <span aria-hidden="true"></span>
  </div>

  <section class="auth-card">
    <div class="auth-card__content">
      <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">

        <!-- EMAIL -->
        <div class="field">
          <label class="field-label" for="login-email">Adresse e-mail</label>
          <mat-form-field appearance="outline" class="full">
            <input
              matInput
              id="login-email"
              type="email"
              formControlName="email"
              autocomplete="email"
            />

            @if (form.controls.email.touched && form.controls.email.invalid) {
              <mat-error>Veuillez saisir une adresse e-mail valide.</mat-error>
            }
          </mat-form-field>
        </div>

        <!-- PASSWORD -->
        <div class="field">
          <label class="field-label" for="login-password">Mot de passe</label>
          <mat-form-field appearance="outline" class="full">
            <input
              matInput
              id="login-password"
              type="password"
              formControlName="password"
              autocomplete="current-password"
            />

            @if (form.controls.password.touched && form.controls.password.invalid) {
              <mat-error>Mot de passe requis.</mat-error>
            }
          </mat-form-field>
        </div>

        <div class="actions">
          <button class="mdd-button" type="submit" [disabled]="form.invalid || isSubmitting">
            Se connecter
          </button>
        </div>

        @if (error) {
          <mat-error>{{ error }}</mat-error>
        }

      </form>
    </div>
  </section>
</main>
