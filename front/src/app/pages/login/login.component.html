<mat-toolbar color="primary" class="auth-toolbar">
  <a routerLink="/" class="auth-toolbar__brand" aria-label="Retour à l’accueil">
    <img src="assets/logo_p6.png" alt="MDD" class="auth-toolbar__logo" />
  </a>
</mat-toolbar>

<main class="container page">
  <div class="topbar">
    <a mat-icon-button routerLink="/" aria-label="Retour">
      <mat-icon>west</mat-icon>
    </a>
    <h1 class="topbar__title">Se connecter</h1>
    <span aria-hidden="true"></span>
  </div>

  <section class="auth-card">
    <div class="auth-card__content">
      <form class="auth-form" action="#" method="post">

        <div class="field">
          <label class="field-label" for="login-identifier">E-mail ou nom d’utilisateur</label>
          <mat-form-field appearance="outline" class="full">
            <input
              matInput
              id="login-identifier"
              type="text"

              autocomplete="email"
            />
          </mat-form-field>
        </div>

        <div class="field">
          <label class="field-label" for="login-password">Mot de passe</label>
          <mat-form-field appearance="outline" class="full">
            <input
              matInput
              id="login-password"
              type="password"

              autocomplete="current-password"
            />
          </mat-form-field>
        </div>

        <div class="actions">
          <button class="mdd-button" type="button">Se connecter</button>
        </div>

      </form>
    </div>
  </section>
</main>
