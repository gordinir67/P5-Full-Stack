<app-header></app-header>

<main class="container page">
  <section class="grid" aria-label="Liste des themes">

    @if (error) {
      <p>{{ error }}</p>
    }

    @if (!isLoading && !error && themes.length === 0) {
      <p>Aucun thème.</p>
    }

    @for (theme of themes; track theme.id) {
      <mat-card class="themes-card">
        <mat-card-title>{{ theme.title }}</mat-card-title>
        <p>{{ theme.description }}</p>

        <div class="actions">
          <button
            class="mdd-button"
            type="button"
            [disabled]="theme.subscribed || isLoading"
            (click)="subscribe(theme)"
          >
            {{ theme.subscribed ? 'Déjà abonné' : 'S’abonner' }}
          </button>
        </div>
      </mat-card>
    }
  </section>
</main>
