<input
  id="mobileNavToggle"
  class="mobile-nav-toggle"
  type="checkbox"
  aria-hidden="true"
/>

<mat-toolbar color="primary" class="app-toolbar">
  <img src="assets/logo_p6.png" alt="MDD" class="logo" />

  <span class="spacer"></span>

  <nav class="nav nav--desktop" aria-label="Navigation principale">

    <button mat-button type="button" class="logout-btn">
      Se déconnecter
    </button>

    <a
      mat-button
      routerLink="/articles"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Articles
    </a>

    <a
      mat-button
      routerLink="/themes"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Thèmes
    </a>

    <a
      mat-button
      routerLink="/me"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      aria-label="Profil"
      class="profile-btn"
      #rlaMe="routerLinkActive"
    >
      <img
        class="profile-icon"
        [src]="rlaMe.isActive ? 'assets/profile-icon-me.png' : 'assets/profile-icon.png'"
        alt="Profil"
      />
    </a>
  </nav>

  <label
    for="mobileNavToggle"
    class="nav nav--mobile mobile-menu-btn"
    aria-label="Ouvrir le menu"
    role="button"
    tabindex="0"
  >
    <mat-icon>menu</mat-icon>
  </label>
</mat-toolbar>

<label
  for="mobileNavToggle"
  class="mobile-drawer-backdrop"
  aria-label="Fermer le menu"
></label>

<aside class="mobile-drawer" aria-label="Menu mobile">
  <div class="mobile-drawer__content">

    <button type="button" class="mobile-drawer__item logout-menu-item">
      Se déconnecter
    </button>

    <label
      for="mobileNavToggle"
      class="mobile-drawer__item"
      routerLink="/articles"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      role="menuitem"
      tabindex="0"
    >
      Articles
    </label>

    <label
      for="mobileNavToggle"
      class="mobile-drawer__item"
      routerLink="/themes"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      role="menuitem"
      tabindex="0"
    >
      Thèmes
    </label>

    <label
      for="mobileNavToggle"
      class="mobile-drawer__profile profile-menu-item"
      routerLink="/me"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      aria-label="Profil"
      role="menuitem"
      tabindex="0"
      #rlaMeMobile="routerLinkActive"
    >
      <img
        src="assets/profile-icon.png"
        class="profile-icon"
        [src]="rlaMeMobile.isActive ? 'assets/profile-icon-me.png' : 'assets/profile-icon.png'"
        alt="Profil"
      />
      <span class="sr-only">Profil</span>
    </label>
  </div>
</aside>
