<mat-toolbar color="primary" class="app-toolbar">
  <a class="brand" routerLink="/articles" aria-label="Accueil (Articles)">
    <img src="assets/logo_p6.png" alt="MDD" class="logo" />
  </a>

  <span class="spacer"></span>

  <!-- Desktop navigation -->
  <nav class="nav nav--desktop" aria-label="Navigation principale">
    <!-- Déconnexion en premier -->
    <button mat-button type="button" class="logout-btn">
      Se déconnecter
    </button>

    <a
      mat-button
      routerLink="/articles"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Articles
    </a>

    <a
      mat-button
      routerLink="/themes"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Thèmes
    </a>

    <!-- Profil => image -->
    <a
      mat-button
      routerLink="/profile"
      routerLinkActive="is-active"
      aria-label="Profil"
      class="profile-btn"
    >
      <img src="assets/profile-icon.png" alt="Profil" class="profile-icon" />
    </a>
  </nav>

  <!-- Mobile menu -->
  <button
    mat-icon-button
    class="nav nav--mobile"
    [matMenuTriggerFor]="mobileMenu"
    aria-label="Ouvrir le menu"
    type="button"
  >
    <mat-icon>menu</mat-icon>
  </button>

  <mat-menu #mobileMenu="matMenu" xPosition="before">
    <!-- Déconnexion en premier -->
    <button mat-menu-item type="button" class="logout-menu-item">
      <mat-icon class="logout-icon">logout</mat-icon>
      <span>Se déconnecter</span>
    </button>

    <mat-divider></mat-divider>

    <button
      mat-menu-item
      routerLink="/articles"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <mat-icon>article</mat-icon>
      <span>Articles</span>
    </button>

    <button
      mat-menu-item
      routerLink="/themes"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <mat-icon>topic</mat-icon>
      <span>Thèmes</span>
    </button>

    <!-- Profil => image -->
    <button
      mat-menu-item
      routerLink="/profile"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
      aria-label="Profil"
      class="profile-menu-item"
    >
      <img src="/assets/profile-icon.png" alt="Profil" class="profile-icon" />
      <span class="sr-only">Profil</span>
    </button>
  </mat-menu>
</mat-toolbar>
